services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: rest_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rest
      POSTGRES_PASSWORD: rest
      POSTGRES_DB: rest_dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rest_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rest -d rest_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rest_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - rest_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: rest_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - rest_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: rest_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/rest-dev &&
      mc anonymous set download local/rest-dev || true
      "

volumes:
  rest_pg_data:
  rest_redis_data:
  rest_minio_data:
