# =====================================================================
# infra/docker-compose.prod.yml — single-droplet monolith deploy.
#
# Pre-requisites you provision on DigitalOcean (NOT in this file):
#   - Managed Postgres with PostGIS extension enabled  → DATABASE_URL
#   - Managed Redis                                    → REDIS_URL
#   - Spaces bucket (S3-compatible)                    → S3_* envs
#
# Everything else (api, web, optional reverse proxy) runs on a single
# droplet. Use Caddy if you have a domain + want auto-HTTPS. Skip it
# (`docker compose -f docker-compose.prod.yml up -d api web`) if you're
# fronting with a DO Load Balancer or just hitting raw ports for testing.
# =====================================================================

services:
  api:
    image: ${API_IMAGE:-rest-api:local}
    env_file: .env.prod
    restart: unless-stopped
    expose:
      - "4000"
    ports:
      # Comment out if Caddy is the only ingress.
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: ${WEB_IMAGE:-rest-web:local}
    env_file: .env.prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    ports:
      # Comment out if Caddy is the only ingress.
      - "3000:3000"
    environment:
      # Web → api comms goes through the docker network.
      API_URL: http://api:4000

  # Optional reverse proxy with automatic Let's Encrypt TLS.
  #
  # Uncomment this block AND point your domain's A record at the droplet
  # IP. Caddy listens on 80/443 and reverse-proxies / → web, /api/* → api.
  # If you'd rather front with a DO Load Balancer, remove this entire
  # service and keep the explicit 3000/4000 port mappings above.
  #
  # caddy:
  #   image: caddy:2.8-alpine
  #   restart: unless-stopped
  #   depends_on: [web, api]
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #
  # volumes:
  #   caddy_data:
  #   caddy_config:
