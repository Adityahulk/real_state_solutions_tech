name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: rest
          POSTGRES_PASSWORD: rest
          POSTGRES_DB: rest_dev
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U rest -d rest_dev"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      DATABASE_URL: postgresql://rest:rest@localhost:5432/rest_dev?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret-ci-secret-ci-secret-ci-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @rest/db generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Prisma migrate (deploy schema)
        run: pnpm --filter @rest/db migrate:deploy || pnpm --filter @rest/db exec prisma migrate dev --name ci --create-only --skip-generate

      - name: Test
        run: pnpm test
